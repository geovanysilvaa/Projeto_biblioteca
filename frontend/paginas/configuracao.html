<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/global.css">
    <link rel="stylesheet" href="../estilos/configuracao.css">
    <link rel="stylesheet" href="../estilos/mensagem.css">
    <title>Biblioteca</title>
</head>

<body>

    <header>
        <h1>Biblioteca
            <img src="../icons/iconLivro.png" alt="imagem icone livro">
        </h1>

        <nav>
            <a href="telaInicio.html">Home</a>
            <a href="pag_cadastro.html">Cadastro</a>
            <a class="btn_selecionado" href="configuracao.html"><img src="../icons/config.png" alt="icone de configuração"></a>
        </nav>

    </header>

    <main>
        <section>
            <div class="container_config">

                <div class="titulo_config">
                    Configuracao da instituicao
                </div>

                <div class="corpo_config">

                    <form id="form_configuracao" class="form_configuracao" autocomplete="on">
                        <label for="cnome">Nome da instituicao</label>
                        <input type="text" id="cnome" name="nome" placeholder="Digite o nome da instituicao" required>

                        <label for="cemail">Email</label>
                        <input type="email" id="cemail" name="email" placeholder="Digite o email" required>

                        <label for="csenha">Nova senha</label>
                        <input type="password" id="csenha" name="senha" placeholder="Digite a nova senha" required>

                        <button type="submit" id="btn_configuracao">Gravar</button>
                    </form>

                </div>

                <div class="rodape_config">
                    Atualize os dados e clique em Gravar
                </div>

            </div>
        </section>
    </main>
    <div id="mensagem"></div>
    <script type="module" src="../scripts/pag_config.js"></script>
    <script type="module" src="../componentes/mensagem.js"></script>
</body>

</html>
