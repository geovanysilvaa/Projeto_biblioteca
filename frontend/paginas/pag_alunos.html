<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/global.css">
    <link rel="stylesheet" href="../estilos/pag_alunos.css">
    <link rel="stylesheet" href="../estilos/mensagem.css">
    <title>Biblioteca</title>
</head>

<body>

    <header>
        <h1>Biblioteca
            <img src="../icons/iconLivro.png" alt="imagem icone livro">
        </h1>

        <nav>
            <a href="telaInicio.html">Home</a>
            <a href="pag_cadastro.html">Cadastro</a>
            <a class="btn_selecionado" href="pag_alunos.html">Aluno</a>
            <a href="pag_emprestimo.html">Emprestimo</a>
            <a href="configuracao.html"><img src="../icons/config.png" alt="icone de configuração"></a>
        </nav>
    </header>

    <main>
        <section>
            <div id="fundo_formulario_aluno" class="fundo_formulario_aluno ocultar_formulario_aluno">
                <div class="titulo_formulario_aluno">
                    <h3 id="titulo_form_aluno">Cadastrar aluno</h3>
                    <button class="btn_fechar_form_aluno" id="btn_fechar_form_aluno" type="button">x</button>
                </div>

                <form id="corpo_formulario_aluno" class="corpo_formulario_aluno" autocomplete="on">
                    <label for="inome_aluno">Nome:</label>
                    <input type="text" id="inome_aluno" name="nome" placeholder="Digite nome do aluno" required>
                    <label for="iturma_aluno">Turma:</label>
                    <input type="text" id="iturma_aluno" name="turma" placeholder="Digite a turma do aluno" required>
                    <label for="iinstituicao_aluno">Instituicao ID:</label>
                    <input type="number" id="iinstituicao_aluno" name="instituicaoID" min="1"
                        placeholder="Digite o ID da instituicao" required>

                    <div class="rodape_formulario_aluno">
                        <button class="btn_gravar_aluno" id="gravar_aluno" type="submit">Gravar</button>
                    </div>
                </form>
            </div>
        </section>

        <section>
            <button class="btn_criar_aluno" id="btn_criar_aluno">Adicionar</button>

            <div class="topo_info_aluno">
                <div class="tipo_aluno">ID</div>
                <div class="tipo_aluno">NOME</div>
                <div class="tipo_aluno">TURMA</div>
                <div class="tipo_aluno">INSTITUICAO ID</div>
            </div>

            <div id="lista_aluno" class="lista_aluno">
                <!-- lista de alunos -->
            </div>
        </section>
    </main>

    <div style="display: flex; justify-content: center; align-items: center; margin-top: 400px;">
        <p id="alunoVazio" style="color: rgb(146, 145, 145); transition: 0.3s ease;"></p>
    </div>

    <div id="mensagem"></div>

    <script type="module" src="../scripts/pag_alunos.js"></script>
    <script type="module" src="../componentes/mensagem.js"></script>
</body>

</html>
