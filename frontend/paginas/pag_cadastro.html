                <h4>Cadastrar livro</h4>

                <button id="btn_fecharForm" type="button">x</button>

            </div>
            
            <!-- form -->
            <form class="corpo_formulario ">

                <label for="inome">Nome:</label>
                <input type="text" id="inome" required>
                <label for="iautor">Autor:</label>
                <input type="text" id="iautor" required>
                <label for="icategoria">Categoria:</label>
                <input type="text" id="icategoria" required>
                <label for="iano">Ano:</label>
                <input type="number" id="iano" min="0" max="9999" required>
                <label for="iquantidade">Quantidade:</label>
                <input type="number" id="iquantidade" min="1" required>

                <div class="rodape_formulario">
                    <button type="submit">Gravar</button>
                </div>
            </form>
            <!-- end form -->
