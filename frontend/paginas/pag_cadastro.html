<body>

    <header>

        <h1>Biblioteca
            <img src="../icons/iconLivro.png" alt="imagem icone livro">
        </h1>

        <nav>
            <a href="telaInicio.html">Home</a>
            <a class="btn_selecionado" href="pag_cadastro.html">Cadastro</a>

    </header>

    <main>

        <section>
            <div id="fundo_formulario" class="fundo_formulario ocultar_formulario">

                <div class="titulo_formulario">

                    <h3 id="titulo_Form">Cadastrar livro</h3>

                    <button class="btn_fecharForm" id="btn_fecharForm" type="button">x</button>

                </div>

                <form id="corpo_formulario" class="corpo_formulario" autocomplete="on">

                    <label for="inome">Nome:</label>
                    <input type="text" id="inome" name="nome" placeholder="Digite nome do livro" required>
                    <label for="iautor">Autor:</label>
                    <input type="text" id="iautor" name="autor" placeholder="Digite nome do autor" required>
                    <label for="icategoria">Categoria:</label>
                    <input type="text" id="icategoria" name="categoria" placeholder="Digite a categoria do livro"
                        required>
                    <label for="iano">Ano:</label>
                    <input type="number" id="iano" min="0" max="9999" name="ano" placeholder="Digite ano do livro"
                        required>
                    <label for="iquantidade">Quantidade:</label>
                    <input type="number" id="iquantidade" min="1" name="quantidade" placeholder="Digite a quantidade"
                        required>

                    <div class="rodape_formulario">
                        <button class="btn_gravar" id="gravar" type="submit">Gravar</button>
                    </div>
                </form>

            </div>
        </section>

        <section>
            <button class="btn_criarL" id="btn_criarL">Adicionar</button>

            <div class="topo_info">
                <div class="tipo">ID</div>
                <div class="tipo">NOME</div>
                <div class="tipo">CATEGORIA</div>
            </div>

            <div id="lista_livro" class="lista_livro">

                <!-- <div class="corpo_livro">
                    <div class="btn_titulo">
                        <button class="btn_info"><img class="btn_i" src="../icons/iconInfo.png" alt=""></button>
                    </div>

                    <div class="fundo_livro">
                        <div class="dados">1</div>
                        <div class="dados">livro</div>
                        <div class="dados">Terror</div>
                    </div>

                    <div class="btn_rodape">
                        <button class="btn_editar"><img class="btn_i" src="../icons/iconEditar.png" alt=""></button>
                        <button class="btn_apagar"><img class="btn_i" src="../icons/iconDelete.png" alt=""></button>
                    </div>
                </div> -->

            </div>

        </section>

    </main>

    <div style="display: flex; justify-content: center; align-items: center; margin-top: 400px;">
        <p id="lVazio" style="color:  rgb(146, 145, 145); transition: 0.3s ease;"></p>
    </div>

    <div id="mensagem"></div>

    <script type="module" src="../scripts/pag_cadastro.js"></script>
    <script type="module" src="../componentes/mensagem.js"></script>
