<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/loginInstituicao.css">
    <link rel="stylesheet" href="../estilos//mensagem.css">
    <link rel="stylesheet" href="../estilos/global.css">
    <title>Biblioteca</title>
</head>

<body>

    <main>

        <h1>Login
            <img src="../icons/iconLivro.png" alt="icone livro">
        </h1>

        <form id="formulario_login">
            <label for="lemail">Email:</label>
            <input type="email" id="lemail" placeholder="Digite seu email" minlength="5" maxlength="30" required>
            <label for="lsenha">Senha:</label>
            <input type="password" id="lsenha" placeholder="Digite sua senha" minlength="5" maxlength="30" required>
            <button type="submit" class="btn_login" id="btn_login">Login</button>
        </form>

        <nav>
            <a href="cadastroInstituicao.html">Cadastrar Instituição?</a>
        </nav>

    </main>
    <div id="mensagem"></div>

    <script type="module" src="../scripts/instituicaoLogin.js"></script>
    <script type="module" src="../componentes/mensagem.js"></script>
</body>

</html>
