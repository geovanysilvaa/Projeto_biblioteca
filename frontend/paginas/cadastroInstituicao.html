<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/cadastrar.css">
    <title>Biblioteca</title>
</head>

<body>
    <!-- main -->
    <main>
        <!-- h2-->
        <h2>Registro
            <img src="../icons/iconLivro.png" alt="icone livro">
        </h2>
        <!-- end h2-->
        <!-- form -->
        <form autocomplete="on">
            <label for="inome">Nome:</label>
            <input type="text" id="inome" placeholder="Digite seu nome" minlength="5" maxlength="30" required>
            <label for="iemail">Email:</label>
            <input type="email" id="iemail" placeholder="Digite seu email" minlength="5" maxlength="30" required>
            <label for="isenha">Senha:</label>
            <input type="password" id="isenha" placeholder="Digite sua senha" minlength="5" maxlength="30" required>
            <button class="btn_cadastro" type="submit">Cadastrar</button>
            <!-- end form -->
        </form>
        <!-- end main -->
    </main>
</body>

</html>
